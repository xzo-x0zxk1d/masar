<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الخريطة - مَسَار</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>#map{height:400px;border-radius:30px;}</style>
</head>
<body>
    <div class="privacy-banner" id="privacyBanner"><span><i class="fas fa-shield-alt"></i> تنبيه الخصوصية</span> — نحتفظ بعنوان IP مرة واحدة. <button id="acceptPrivacy"><i class="fas fa-check"></i> موافق</button></div>
    <nav class="navbar"><div class="nav-container">
        <div class="logo"><img src="school.png" class="school-logo"><span>مَسَار</span><small>فيصل</small></div>
        <ul class="nav-menu">
            <li><a href="index.html"><i class="fas fa-home"></i> الرئيسية</a></li>
            <li><a href="books.html"><i class="fas fa-book"></i> الكتب</a></li>
            <li><a href="audiobooks.html"><i class="fas fa-headphones"></i> المسموع</a></li>
            <li><a href="games.html"><i class="fas fa-gamepad"></i> الألعاب</a></li>
            <li><a href="draw.html"><i class="fas fa-paint-brush"></i> الرسم</a></li>
            <li><a href="map.html" class="active"><i class="fas fa-map"></i> الخريطة</a></li>
        </ul>
        <div class="toolbar">
            <button id="toggleMode"><i class="fas fa-moon"></i></button>
            <button id="increaseFont">A+</button>
            <button id="decreaseFont">A-</button>
        </div>
    </div></nav>

    <section>
        <h2><i class="fas fa-map-marked-alt"></i> خريطة الأماكن</h2>
        <input type="text" id="searchPlace" class="search-box" placeholder="ابحث عن مكان...">
        <div id="map"></div>
        <div id="placesList" style="margin-top:20px;"></div>
    </section>

    <footer class="footer"><p><i class="fas fa-leaf"></i> مَسَار · إبداع <strong>فيصل</strong></p></footer>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <script src="js/main.js"></script>
    <script>
        const places=[{name:'حديقة الملك سلمان',type:'منتزه',location:'الرياض',lat:24.750,lng:46.700},{name:'واجهة جدة',type:'ترفيه',location:'جدة',lat:21.550,lng:39.170}];
        const map=L.map('map').setView([24.7,46.0],6);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        places.forEach(p=>L.marker([p.lat,p.lng]).addTo(map).bindPopup(`<b>${p.name}</b><br>${p.type}`));
        function renderPlaces(list){
            document.getElementById('placesList').innerHTML=list.map(p=>`<div class="card"><h3><i class="fas fa-location-dot"></i> ${p.name}</h3><p>${p.type} · ${p.location}</p></div>`).join('');
        }
        renderPlaces(places);
        document.getElementById('searchPlace').addEventListener('input',e=>{
            const v=e.target.value.toLowerCase();
            renderPlaces(places.filter(p=>p.name.toLowerCase().includes(v)||p.location.toLowerCase().includes(v)));
        });
    </script>
</body>
</html>
