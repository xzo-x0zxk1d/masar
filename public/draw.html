<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>استوديو الرسم - مَسَار</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .canvas-container { background: var(--glass); backdrop-filter: blur(8px); border-radius: 30px; padding: 15px; border: 2px solid var(--lime); }
        canvas { 
            background: #142614; 
            border-radius: 20px; 
            width: 100%; 
            height: auto; 
            border: 2px solid var(--lime); 
            cursor: crosshair; 
            touch-action: none;  /* يمنع السحب/التمرير على الجوال */
            display: block;
        }
        video { border-radius: 20px; border: 3px solid var(--lime); max-width: 100%; display: none; margin-bottom: 15px; }
        .controls { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; align-items: center; }
        @media (max-width: 600px) {
            .controls .btn { padding: 8px 12px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
<div class="privacy-banner" id="privacyBanner">
    <span>🔒 تنبيه الخصوصية</span> — نحتفظ بعنوان IP مرة واحدة. بالمتابعة أنت موافق.
    <button id="acceptPrivacy">موافق</button>
</div>
<nav class="navbar">
    <div class="nav-container">
        <div class="logo">
            <img src="school.png" alt="شعار المدرسة" class="school-logo">
            <span>مَسَار</span>
            <small>فيصل</small>
        </div>
        <ul class="nav-menu">
            <li><a href="index.html">الرئيسية</a></li>
            <li><a href="books.html">الكتب</a></li>
            <li><a href="audiobooks.html">المسموع</a></li>
            <li><a href="games.html">الألعاب</a></li>
            <li><a href="draw.html" class="active">الرسم</a></li>
            <li><a href="map.html">الخريطة</a></li>
        </ul>
        <div class="toolbar">
            <button id="toggleMode" title="تبديل السمة">🌙</button>
            <button id="increaseFont" title="تكبير الخط">أكبر</button>
            <button id="decreaseFont" title="تصغير الخط">أصغر</button>
        </div>
    </div>
</nav>

<section style="padding: 15px 0;">
    <h2 style="font-size:2.2rem; margin-bottom:15px;">✏️ استوديو الرسم</h2>
    <div class="canvas-container">
        <div class="controls">
            <button class="btn" id="startCamera">📸 كاميرا</button>
            <button class="btn btn-outline" id="clearCanvas">🧽 مسح</button>
            <input type="color" id="colorPicker" value="#a3e635" style="width:50px; height:50px; border-radius:20px;">
            <input type="range" id="brushSize" min="2" max="40" value="8" style="width:140px;">
        </div>
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas" width="800" height="500"></canvas>
        <p style="margin-top:12px; font-size:0.95rem;">🖐️ اسحب بإصبعك للرسم · الكاميرا ترسم تلقائياً (جرّب)</p>
    </div>
</section>

<footer class="footer">
    <p>🌿 مَسَار · إبداع <strong>فيصل</strong></p>
</footer>

<script src="js/main.js"></script>
<script>
    (function(){
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;
        let color = '#a3e635';
        let size = 8;

        function resizeCanvas() {
            const container = canvas.parentElement;
            const containerWidth = container.clientWidth;
            canvas.style.width = containerWidth + 'px';
            canvas.style.height = (containerWidth * 0.625) + 'px'; // نسبة 800:500
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        document.getElementById('colorPicker').onchange = e => color = e.target.value;
        document.getElementById('brushSize').oninput = e => size = e.target.value;

        function getCoordinates(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            const x = (clientX - rect.left) * scaleX;
            const y = (clientY - rect.top) * scaleY;
            return { x, y };
        }

        function startDraw(e) {
            e.preventDefault();
            drawing = true;
            const { x, y } = getCoordinates(e);
            ctx.beginPath();
            ctx.fillStyle = color;
            ctx.arc(x, y, size, 0, 2*Math.PI);
            ctx.fill();
        }
        function draw(e) {
            e.preventDefault();
            if (!drawing) return;
            const { x, y } = getCoordinates(e);
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, size, 0, 2*Math.PI);
            ctx.fill();
        }
        function stopDraw(e) { e?.preventDefault(); drawing = false; ctx.beginPath(); }

        canvas.addEventListener('touchstart', startDraw, { passive: false });
        canvas.addEventListener('touchmove', draw, { passive: false });
        canvas.addEventListener('touchend', stopDraw);
        canvas.addEventListener('touchcancel', stopDraw);
        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDraw);
        canvas.addEventListener('mouseleave', stopDraw);

        document.getElementById('clearCanvas').onclick = () => ctx.clearRect(0, 0, canvas.width, canvas.height);

        document.getElementById('startCamera').onclick = async () => {
            const video = document.getElementById('video');
            video.style.display = 'block';
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            // رسم بسيط من الكاميرا (اختياري)
        };
    })();
</script>
</body>
</html>
