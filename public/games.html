<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>مَسَار · 100 لعبة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --lime: #a3e635;
            --deep-lime: #65a30d;
            --mint: #d9f99d;
            --bg: #0a140a;
            --card: #142614;
            --text: #f0fae6;
            --glass: rgba(20,40,20,0.8);
        }
        body.light-mode {
            --bg: #e5f2d8;
            --card: #f4fce8;
            --text: #1a2e1a;
            --lime: #4d7c0f;
            --glass: rgba(255,255,255,0.8);
        }
        body {
            font-family: 'Cairo', 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            font-size: 16px;
            transition: background 0.3s;
            padding: 0 10px 20px;
        }
        .navbar {
            background: var(--glass);
            backdrop-filter: blur(12px);
            padding: 0.8rem 1.2rem;
            position: sticky;
            top: 0;
            z-index: 999;
            border-bottom: 2px solid var(--lime);
            border-radius: 0 0 20px 20px;
            margin-bottom: 20px;
        }
        .nav-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--lime);
        }
        .school-logo { height: 40px; width: auto; border-radius: 10px; }
        .nav-menu {
            display: flex;
            list-style: none;
            gap: 12px;
            flex-wrap: wrap;
        }
        .nav-menu a {
            color: var(--text);
            text-decoration: none;
            padding: 8px 14px;
            border-radius: 30px;
            font-weight: 600;
            border: 1px solid transparent;
            font-size: 0.95rem;
        }
        .nav-menu a:hover, .nav-menu a.active {
            background: var(--lime);
            color: #0a140a;
        }
        .toolbar {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .toolbar button {
            background: var(--card);
            border: 1px solid var(--lime);
            color: var(--text);
            padding: 6px 12px;
            border-radius: 30px;
            cursor: pointer;
        }
        h2 { font-size: 2.2rem; margin: 20px 0; color: var(--lime); }
        .games-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 30px;
        }
        .game-card {
            background: var(--glass);
            backdrop-filter: blur(4px);
            border-radius: 20px;
            padding: 16px 8px;
            border: 2px solid var(--lime);
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }
        .game-card i { font-size: 2rem; display: block; margin-bottom: 5px; color: var(--lime); }
        .game-card:hover { transform: scale(0.97); background: var(--lime); color: #0a140a; }
        .game-card:hover i { color: #0a140a; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--card);
            border: 3px solid var(--lime);
            border-radius: 40px;
            padding: 20px;
            max-width: 600px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            color: var(--text);
            position: relative;
        }
        .close-btn {
            position: absolute;
            top: 15px; left: 15px;
            background: var(--lime);
            border: none;
            font-size: 1.5rem;
            width: 40px; height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
        }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
            border: 2px solid transparent;
            margin: 5px;
            cursor: pointer;
            background: var(--lime);
            color: #0a140a;
        }
        .btn-outline {
            background: transparent;
            border-color: var(--lime);
            color: var(--lime);
        }
        input, select {
            padding: 10px;
            border-radius: 30px;
            border: 2px solid var(--lime);
            background: var(--bg);
            color: var(--text);
            width: 100%;
            margin: 10px 0;
        }
        canvas {
            background: #0a1a0a;
            border-radius: 20px;
            display: block;
            margin: 10px auto;
            border: 2px solid var(--lime);
            touch-action: none;
        }
        .footer {
            margin-top: 40px;
            padding: 25px;
            text-align: center;
            background: #0a140a;
            border-top: 3px solid var(--lime);
            border-radius: 30px 30px 0 0;
        }
        @media (min-width:600px) { .games-grid { grid-template-columns: repeat(3,1fr); } body { font-size:18px; } }
        @media (min-width:900px) { .games-grid { grid-template-columns: repeat(5,1fr); } }
        @media (min-width:1200px) { .games-grid { grid-template-columns: repeat(6,1fr); } }
    </style>
</head>
<body>
<div class="navbar">
    <div class="nav-container">
        <div class="logo"><i class="fas fa-map-signs" style="color:var(--lime);"></i> <span>مَسَار</span> <small>فيصل</small></div>
        <ul class="nav-menu">
            <li><a href="index.html"><i class="fas fa-home"></i> الرئيسية</a></li>
            <li><a href="books.html"><i class="fas fa-book"></i> الكتب</a></li>
            <li><a href="audiobooks.html"><i class="fas fa-headphones"></i> المسموع</a></li>
            <li><a href="games.html" class="active"><i class="fas fa-gamepad"></i> الألعاب</a></li>
            <li><a href="draw.html"><i class="fas fa-paint-brush"></i> الرسم</a></li>
            <li><a href="map.html"><i class="fas fa-map"></i> الخريطة</a></li>
        </ul>
        <div class="toolbar">
            <button id="toggleMode"><i class="fas fa-moon"></i></button>
            <button id="increaseFont">A+</button>
            <button id="decreaseFont">A-</button>
        </div>
    </div>
</div>

<h2 style="text-align:center;"><i class="fas fa-gamepad"></i> 100 لعبة تفاعلية</h2>
<div id="gamesGridContainer" class="games-grid"></div>

<div class="modal" id="gameModal">
    <div class="modal-content">
        <button class="close-btn" id="closeModal"><i class="fas fa-times"></i></button>
        <h3 id="gameTitle" style="margin-bottom:15px; text-align:center;"></h3>
        <div id="gameContent"></div>
    </div>
</div>

<footer class="footer">
    <p><i class="fas fa-leaf"></i> مَسَار · إبداع <strong>فيصل</strong> · 100 لعبة كاملة</p>
</footer>

<script>
    // قائمة الألعاب الأساسية (سيتم تحميل المنطق من ملف خارجي)
    const gamesList = [
        {id:1, name:'Wordle', icon:'fa-font'},{id:2, name:'تخمين الرقم', icon:'fa-hashtag'},{id:3, name:'ذاكرة البطاقات', icon:'fa-clone'},
        {id:4, name:'لغز 15', icon:'fa-th'},{id:5, name:'الكلمة المبعثرة', icon:'fa-arrow-right-arrow-left'},{id:6, name:'سودوكو 4×4', icon:'fa-table-cells'},
        {id:7, name:'صح أو خطأ', icon:'fa-check-double'},{id:8, name:'مسابقة الرياضيات', icon:'fa-calculator'},{id:9, name:'تكرار النمط', icon:'fa-palette'},
        {id:10, name:'ذاكرة الأرقام', icon:'fa-list-ol'},{id:11, name:'المختلف', icon:'fa-eye'},{id:12, name:'تخمين الإيموجي', icon:'fa-face-smile'},
        {id:13, name:'تخمين العلم', icon:'fa-flag'},{id:14, name:'اختبار العواصم', icon:'fa-globe'},{id:15, name:'ألغاز', icon:'fa-question'},
        {id:16, name:'بوابات منطقية', icon:'fa-microchip'},{id:17, name:'أحجية ثنائية', icon:'fa-circle'},{id:18, name:'إعادة ترتيب', icon:'fa-shuffle'},
        {id:19, name:'سلم الأرقام', icon:'fa-chart-line'},{id:20, name:'شبكة الرياضيات', icon:'fa-border-all'},{id:21, name:'اختبار سرعة', icon:'fa-stopwatch'},
        {id:22, name:'الضاغط السريع', icon:'fa-hand-pointer'},{id:23, name:'مدرب التصويب', icon:'fa-bullseye'},{id:24, name:'تجنب المربعات', icon:'fa-arrow-up'},
        {id:25, name:'النقر السريع', icon:'fa-gauge-high'},{id:26, name:'دائرة الانعكاس', icon:'fa-circle-notch'},{id:27, name:'تحدي السحب', icon:'fa-arrow-right'},
        {id:28, name:'تبديل الألوان', icon:'fa-fill-drip'},{id:29, name:'رياضيات سريعة', icon:'fa-plus-minus'},{id:30, name:'امسك النقطة', icon:'fa-circle'},
        {id:31, name:'تجنب الخط', icon:'fa-grip-lines'},{id:32, name:'إيقاف المؤقت', icon:'fa-hourglass-half'},{id:33, name:'نقر مزدوج', icon:'fa-hand-back-fist'},
        {id:34, name:'رد فعل اللون', icon:'fa-paint-roller'},{id:35, name:'اختبار الاتجاه', icon:'fa-location-arrow'},{id:36, name:'رمي النرد', icon:'fa-dice'},
        {id:37, name:'عجلة الحظ', icon:'fa-circle-radiation'},{id:38, name:'اختر باباً', icon:'fa-door-open'},{id:39, name:'مونتي هول', icon:'fa-door-closed'},
        {id:40, name:'رمي العملة', icon:'fa-coin'},{id:41, name:'السحب المحظوظ', icon:'fa-ticket'},{id:42, name:'مكافأة عشوائية', icon:'fa-gift'},
        {id:43, name:'خمن الكأس', icon:'fa-mug-saucer'},{id:44, name:'رقم الحظ', icon:'fa-star'},{id:45, name:'روليت', icon:'fa-record-vinyl'},
        {id:46, name:'فلابي سكوير', icon:'fa-square'},{id:47, name:'محطم الطوب', icon:'fa-cubes'},{id:48, name:'الثعبان', icon:'fa-snake'},
        {id:49, name:'بونغ', icon:'fa-table-tennis'},{id:50, name:'تجنب الجدران', icon:'fa-arrows-up-down-left-right'},{id:51, name:'مكعب القفز', icon:'fa-cube'},
        {id:52, name:'الكتل المتساقطة', icon:'fa-arrow-down-wide-short'},{id:53, name:'عداء المنصة', icon:'fa-person-running'},{id:54, name:'التقاط العناصر', icon:'fa-basket-shopping'},
        {id:55, name:'تجنب الليزر', icon:'fa-bolt'},{id:56, name:'ارسم المسار', icon:'fa-pencil'},{id:57, name:'كرة التوازن', icon:'fa-circle-dot'},
        {id:58, name:'تتبع الخط', icon:'fa-grip-lines'},{id:59, name:'الهروب من المتاهة', icon:'fa-maze'},{id:60, name:'التوقيت المثالي', icon:'fa-clock'},
        {id:61, name:'تسديد الزاوية', icon:'fa-angles-right'},{id:62, name:'قناص الأهداف', icon:'fa-crosshairs'},{id:63, name:'هدف متحرك', icon:'fa-arrows-spin'},
        {id:64, name:'إسقاط دقيق', icon:'fa-arrow-down'},{id:65, name:'قفزة واحدة', icon:'fa-arrow-up'},{id:66, name:'الذكاء الاصطناعي يخمن رقمي', icon:'fa-robot'},
        {id:67, name:'الذكاء الاصطناعي يخمن كلمتي', icon:'fa-microchip'},{id:68, name:'تخمين المشاعر', icon:'fa-face-grin'},{id:69, name:'من أنا؟', icon:'fa-user-secret'},
        {id:70, name:'تخمين الحيوان', icon:'fa-paw'},{id:71, name:'تخمين الشيء', icon:'fa-couch'},{id:72, name:'تخمين الدولة', icon:'fa-earth-asia'},
        {id:73, name:'حل الألغاز', icon:'fa-puzzle-piece'},{id:74, name:'فئة الكلمة', icon:'fa-tags'},{id:75, name:'نمط الأرقام', icon:'fa-chart-simple'},
        {id:76, name:'تحريك البلاط', icon:'fa-border-none'},{id:77, name:'توصيل الأنابيب', icon:'fa-pipe'},{id:78, name:'دمج المربعات', icon:'fa-cubes'},
        {id:79, name:'تدفق الألوان', icon:'fa-fill'},{id:80, name:'ملاءمة الأشكال', icon:'fa-shapes'},{id:81, name:'تدوير الأحجية', icon:'fa-rotate'},
        {id:82, name:'بانوراما صغيرة', icon:'fa-table'},{id:83, name:'ماتش 3', icon:'fa-gem'},{id:84, name:'توصيل النقاط', icon:'fa-circle-nodes'},
        {id:85, name:'دمج الأرقام', icon:'fa-arrow-up-1-9'},{id:86, name:'معلومات عامة', icon:'fa-brain'},{id:87, name:'اختبار التاريخ', icon:'fa-landmark'},
        {id:88, name:'اختبار العلوم', icon:'fa-flask'},{id:89, name:'اختبار الرياضة', icon:'fa-futbol'},{id:90, name:'اختبار التقنية', icon:'fa-laptop'},
        {id:91, name:'اختبار الجغرافيا', icon:'fa-map'},{id:92, name:'اختبار الرياضيات', icon:'fa-square-root-variable'},{id:93, name:'اختبار اللغة', icon:'fa-language'},
        {id:94, name:'معاني الإيموجي', icon:'fa-face-smile'},{id:95, name:'اختبار المنطق', icon:'fa-gears'},{id:96, name:'تحكم مرآة', icon:'fa-arrows-left-right'},
        {id:97, name:'تحكم معكوس', icon:'fa-arrow-right-arrow-left'},{id:98, name:'لعبة زر واحد', icon:'fa-circle'},{id:99, name:'قلب الجاذبية', icon:'fa-arrow-down-up-across-line'},
        {id:100, name:'متاهة خفية', icon:'fa-eye-slash'}
    ];

    const grid = document.getElementById('gamesGridContainer');
    grid.innerHTML = gamesList.map(g => `
        <div class="game-card" data-id="${g.id}" data-name="${g.name}">
            <i class="fas ${g.icon}"></i>
            <strong>${g.name}</strong>
        </div>
    `).join('');

    const modal = document.getElementById('gameModal');
    const title = document.getElementById('gameTitle');
    const content = document.getElementById('gameContent');
    let activeCleanup = null;

    function closeModal() {
        modal.classList.remove('active');
        if (activeCleanup) { activeCleanup(); activeCleanup = null; }
        content.innerHTML = '';
    }
    document.getElementById('closeModal').onclick = closeModal;
    modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });

    // تحميل ملف البيانات الخارجي
    const script = document.createElement('script');
    script.src = 'js/games-data.js';
    script.onload = function() {
        // بعد تحميل البيانات، ربط البطاقات
        grid.addEventListener('click', (e) => {
            const card = e.target.closest('.game-card');
            if (!card) return;
            const id = parseInt(card.dataset.id);
            const name = card.dataset.name;
            const icon = gamesList.find(g=>g.id===id).icon;
            title.innerHTML = `<i class="fas ${icon}"></i> ${name}`;
            modal.classList.add('active');
            // استدعاء دالة اللعبة من الكائن العالمي
            if (typeof window.GameLoader !== 'undefined' && window.GameLoader.loadGame) {
                window.GameLoader.loadGame(id, content, (cleanup) => { activeCleanup = cleanup; });
            } else {
                content.innerHTML = '<p>خطأ في تحميل الألعاب</p>';
            }
        });
    };
    document.head.appendChild(script);

    // إعدادات المظهر
    document.getElementById('toggleMode').onclick = ()=> document.body.classList.toggle('light-mode');
    document.getElementById('increaseFont').onclick = ()=>{
        let fs = parseFloat(getComputedStyle(document.body).fontSize);
        document.body.style.fontSize = Math.min(28, fs+2)+'px';
    };
    document.getElementById('decreaseFont').onclick = ()=>{
        let fs = parseFloat(getComputedStyle(document.body).fontSize);
        document.body.style.fontSize = Math.max(12, fs-2)+'px';
    };
</script>
</body>
</html>
