            --text: #1a2e1a;

            transition: background 0.3s;
            padding: 0 10px 20px;

        .navbar {
            background: var(--glass);
            backdrop-filter: blur(12px);
            padding: 0.8rem 1.2rem;
            position: sticky;
            top: 0;
            z-index: 999;
            border-bottom: 2px solid var(--lime);
            border-radius: 0 0 20px 20px;
            margin-bottom: 20px;
        }
        .nav-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--lime);
        }
        .school-logo { height: 40px; width: auto; border-radius: 10px; }
        .nav-menu {
            display: flex;
            list-style: none;
            gap: 12px;
            flex-wrap: wrap;
        }
        .nav-menu a {
            color: var(--text);
            text-decoration: none;
            padding: 8px 14px;
            border-radius: 30px;
            font-weight: 600;
            border: 1px solid transparent;
            font-size: 0.95rem;
        }
        .nav-menu a:hover, .nav-menu a.active {
            background: var(--lime);
            color: #0a140a;
        }
        .toolbar {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .toolbar button {

            border: 1px solid var(--lime);
            color: var(--text);
            padding: 6px 12px;
            border-radius: 30px;
            cursor: pointer;
        }
        h2 {
            font-size: 2.2rem;
            margin: 20px 0;
            color: var(--lime);
        }
        .games-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 30px;
        }
        .game-card {
            background: var(--glass);
            backdrop-filter: blur(4px);
            border-radius: 20px;
            padding: 16px 8px;
            border: 2px solid var(--lime);
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }
        .game-card i { font-size: 2rem; display: block; margin-bottom: 5px; color: var(--lime); }
        .game-card:hover { transform: scale(0.97); background: var(--lime); color: #0a140a; }
        .game-card:hover i { color: #0a140a; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--card);
            border: 3px solid var(--lime);
            border-radius: 40px;
            padding: 20px;
            max-width: 600px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            color: var(--text);
            position: relative;
        }
        .close-btn {
            position: absolute;
            top: 15px; left: 15px;
            background: var(--lime);
            border: none;
            font-size: 1.5rem;
            width: 40px; height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
        }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
            border: 2px solid transparent;
            margin: 5px;
            cursor: pointer;
            background: var(--lime);
            color: #0a140a;
        }
        .btn-outline {
            background: transparent;
            border-color: var(--lime);
            color: var(--lime);
        }
        input, select {
            padding: 10px;
            border-radius: 30px;
            border: 2px solid var(--lime);
            background: var(--bg);
            color: var(--text);
            width: 100%;
            margin: 10px 0;
        }
        canvas {
            background: #0a1a0a;
            border-radius: 20px;
            display: block;
            margin: 10px auto;
            border: 2px solid var(--lime);
            touch-action: none;
        }
        .footer {
            margin-top: 40px;
            padding: 25px;
            text-align: center;
            background: #0a140a;
            border-top: 3px solid var(--lime);
            border-radius: 30px 30px 0 0;
        }
        @media (min-width:600px) { .games-grid { grid-template-columns: repeat(3,1fr); } body { font-size:18px; } }
        @media (min-width:900px) { .games-grid { grid-template-columns: repeat(5,1fr); } }
        @media (min-width:1200px) { .games-grid { grid-template-columns: repeat(6,1fr); } }
    </style>
</head>
