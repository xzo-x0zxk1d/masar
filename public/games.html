<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>ألعاب مَسَار · 20 لعبة</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .games-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }
        .game-card {
            background: var(--glass);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 16px 8px;
            border: 2px solid var(--lime);
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }
        .game-card span { font-size: 2.2rem; display: block; margin-bottom: 5px; }
        .game-card:hover { transform: scale(0.98); background: var(--lime); color: #0a140a; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--card);
            border: 3px solid var(--lime);
            border-radius: 40px;
            padding: 20px;
            max-width: 500px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            color: var(--text);
            position: relative;
        }
        .close-btn {
            position: absolute;
            top: 15px; left: 15px;
            background: var(--lime);
            border: none;
            font-size: 1.5rem;
            width: 40px; height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
        }
        .game-area { margin-top: 15px; }
        .btn-small { padding: 8px 16px; font-size: 1rem; }
        @media (min-width: 600px) {
            .games-grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media (min-width: 900px) {
            .games-grid { grid-template-columns: repeat(5, 1fr); }
        }
        canvas { background: #0a1a0a; border-radius: 20px; display: block; margin: 10px 0; }
        .wheel-container { position: relative; width: 200px; height: 200px; margin: 0 auto; }
    </style>
</head>
<body>
<div class="privacy-banner" id="privacyBanner">
    <span>🔒 تنبيه الخصوصية</span> — نحتفظ بعنوان IP مرة واحدة. بالمتابعة أنت موافق.
    <button id="acceptPrivacy">موافق</button>
</div>
<nav class="navbar">
    <div class="nav-container">
        <div class="logo">
            <img src="school.png" alt="شعار المدرسة" class="school-logo">
            <span>مَسَار</span>
            <small>فيصل</small>
        </div>
        <ul class="nav-menu">
            <li><a href="index.html">الرئيسية</a></li>
            <li><a href="books.html">الكتب</a></li>
            <li><a href="audiobooks.html">المسموع</a></li>
            <li><a href="games.html" class="active">الألعاب</a></li>
            <li><a href="draw.html">الرسم</a></li>
            <li><a href="map.html">الخريطة</a></li>
        </ul>
        <div class="toolbar">
            <button id="toggleMode" title="تبديل السمة">🌙</button>
            <button id="increaseFont" title="تكبير الخط">أكبر</button>
            <button id="decreaseFont" title="تصغير الخط">أصغر</button>
        </div>
    </div>
</nav>

<section style="padding: 20px 0;">
    <h2 style="font-size:2.2rem; margin-bottom:20px;">🎮 20 لعبة ممتعة</h2>
    <div class="games-grid" id="gamesGrid"></div>
</section>

<!-- نافذة الألعاب المنبثقة -->
<div class="modal" id="gameModal">
    <div class="modal-content">
        <button class="close-btn" id="closeModal">✕</button>
        <h3 id="gameTitle" style="margin-bottom:15px; text-align:center;"></h3>
        <div id="gameContent" class="game-area"></div>
    </div>
</div>

<footer class="footer">
    <p>🌿 مَسَار · إبداع <strong>فيصل</strong></p>
</footer>

<script src="js/main.js"></script>
<script>
    (function(){
        const games = [
            { id:1, name:'Wordle', icon:'🟩', desc:'خمن الكلمة من 5 حروف' },
            { id:2, name:'تخمين الرقم', icon:'🎯', desc:'1-100' },
            { id:3, name:'حجر ورقة مقص', icon:'✊', desc:'ضد الحاسوب' },
            { id:4, name:'ذاكرة البطاقات', icon:'🃏', desc:'طابق الأزواج' },
            { id:5, name:'الضاغط السريع', icon:'👆', desc:'اضغط الزر المتحرك' },
            { id:6, name:'سرعة رد الفعل', icon:'⏱️', desc:'اختبر سرعتك' },
            { id:7, name:'لغز 15', icon:'🔢', desc:'رتب الأرقام' },
            { id:8, name:'الكلمة المبعثرة', icon:'🔤', desc:'أعد ترتيب الحروف' },
            { id:9, name:'صح أو خطأ', icon:'✅', desc:'أسئلة سريعة' },
            { id:10, name:'سودوكو صغيرة', icon:'🧩', desc:'4×4' },
            { id:11, name:'عجلة الحظ', icon:'🎡', desc:'دور واحصل على نتيجة' },
            { id:12, name:'رمي النرد', icon:'🎲', desc:'ضد الكمبيوتر' },
            { id:13, name:'لعبة مونتي هول', icon:'🚪', desc:'اختر الباب الصحيح' },
            { id:14, name:'كرة فلافي', icon:'🐦', desc:'نسخة Flappy Bird' },
            { id:15, name:'تجنب العقبات', icon:'🏃', desc:'اقفز فوق العوائق' },
            { id:16, name:'التقاط الساقطات', icon:'🧺', desc:'اجمع العناصر' },
            { id:17, name:'أوجد الاختلافات', icon:'🔍', desc:'قارن بين صورتين' },
            { id:18, name:'ارسم المسار', icon:'✏️', desc:'ارسم خطًا للهدف' },
            { id:19, name:'اختبار العواصم', icon:'🌍', desc:'خمن العاصمة' },
            { id:20, name:'تخمين الصوت', icon:'🔊', desc:'ما هذا الصوت؟' }
        ];

        const grid = document.getElementById('gamesGrid');
        grid.innerHTML = games.map(g => `
            <div class="game-card" data-id="${g.id}" data-name="${g.name}">
                <span>${g.icon}</span>
                <strong>${g.name}</strong>
                <div style="font-size:0.75rem;">${g.desc}</div>
            </div>
        `).join('');

        const modal = document.getElementById('gameModal');
        const title = document.getElementById('gameTitle');
        const content = document.getElementById('gameContent');
        let activeGameInstance = null;

        function openGame(id, name) {
            title.textContent = name;
            modal.classList.add('active');
            loadGame(id);
        }

        function closeModal() {
            modal.classList.remove('active');
            if (activeGameInstance && typeof activeGameInstance.cleanup === 'function') {
                activeGameInstance.cleanup();
            }
            activeGameInstance = null;
            content.innerHTML = '';
        }

        document.getElementById('closeModal').onclick = closeModal;
        modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });

        grid.addEventListener('click', (e) => {
            const card = e.target.closest('.game-card');
            if (!card) return;
            openGame(card.dataset.id, card.dataset.name);
        });

        // ---------- دوال تحميل كل لعبة ----------
        function loadGame(id) {
            content.innerHTML = '';
            switch (parseInt(id)) {
                case 1: wordleGame(); break;
                case 2: guessNumber(); break;
                case 3: rpsGame(); break;
                case 4: memoryCards(); break;
                case 5: fastClicker(); break;
                case 6: reactionTest(); break;
                case 7: puzzle15(); break;
                case 8: wordScramble(); break;
                case 9: trueFalse(); break;
                case 10: miniSudoku(); break;
                case 11: spinWheel(); break;
                case 12: diceRoll(); break;
                case 13: montyHall(); break;
                case 14: flappyDot(); break;
                case 15: avoidObstacles(); break;
                case 16: catchFalling(); break;
                case 17: findDifference(); break;
                case 18: drawPath(); break;
                case 19: capitalsQuiz(); break;
                case 20: soundGuessing(); break;
                default: content.innerHTML = '<p>قيد التطوير</p>';
            }
        }

        // 1 - Wordle مبسطة
        function wordleGame() {
            const secret = 'رياضة'; // 5 حروف
            let attempts = 0;
            content.innerHTML = `
                <p>خمن كلمة من 5 حروف (موضوع: رياضة)</p>
                <input id="wordGuess" maxlength="5" placeholder="أدخل الكلمة" style="width:100%; padding:10px;">
                <button class="btn" id="submitWord">خمن</button>
                <p id="wordResult"></p>
            `;
            document.getElementById('submitWord').onclick = () => {
                const g = document.getElementById('wordGuess').value.trim();
                if (g.length !==5) return;
                attempts++;
                if (g === secret) document.getElementById('wordResult').innerText = `🎉 أحسنت! الكلمة: ${secret} (${attempts} محاولات)`;
                else document.getElementById('wordResult').innerText = `❌ حاول مرة أخرى (المحاولة ${attempts})`;
            };
        }

        // 2 - تخمين الرقم
        function guessNumber() {
            const secret = Math.floor(Math.random()*100)+1; let tries=0;
            content.innerHTML = `<h3>🎯 1-100</h3><input id="guessInput" type="number" min="1" max="100"><button class="btn" id="guessBtn">خمن</button><p id="guessResult"></p>`;
            document.getElementById('guessBtn').onclick = ()=>{
                const g = parseInt(document.getElementById('guessInput').value); tries++;
                document.getElementById('guessResult').innerText = g===secret ? `🎉 صح! (${tries})` : (g>secret?'أصغر':'أكبر');
            };
        }

        // 3 - حجر ورقة مقص
        function rpsGame() {
            const opts = ['حجر','ورقة','مقص'];
            content.innerHTML = `<div>${opts.map(o=>`<button class="btn rps" data-choice="${o}">${o}</button>`).join('')}</div><p id="rpsRes"></p>`;
            document.querySelectorAll('.rps').forEach(b=> b.onclick = function(){
                const user = this.dataset.choice, comp = opts[Math.floor(Math.random()*3)];
                let res = user===comp?'تعادل':((user==='حجر'&&comp==='مقص')||(user==='ورقة'&&comp==='حجر')||(user==='مقص'&&comp==='ورقة'))?'فزت':'خسرت';
                document.getElementById('rpsRes').innerText = `أنت ${user} · الحاسوب ${comp} · ${res}`;
            });
        }

        // 4 - ذاكرة (نسخة مصغرة)
        function memoryCards() {
            content.innerHTML = `<p>🧩 اضغط على البطاقات (سيتم إضافة لعبة كاملة لاحقاً)</p>`;
        }

        // 5 - الضاغط السريع
        function fastClicker() {
            let score = 0, timeLeft = 10;
            content.innerHTML = `<p>اضغط الزر بأسرع ما يمكن!</p><button id="fastBtn" class="btn" style="width:100%; padding:20px;">اضغط!</button><p id="scoreDisplay">0</p><p id="timer">10</p>`;
            const btn = document.getElementById('fastBtn');
            const scoreP = document.getElementById('scoreDisplay');
            const timerP = document.getElementById('timer');
            btn.onclick = () => { score++; scoreP.textContent = score; };
            const timer = setInterval(() => {
                timeLeft--;
                timerP.textContent = timeLeft;
                if (timeLeft <=0) {
                    clearInterval(timer);
                    btn.disabled = true;
                    content.innerHTML += `<p>انتهى الوقت! النتيجة: ${score}</p>`;
                }
            }, 1000);
            activeGameInstance = { cleanup: () => clearInterval(timer) };
        }

        // 6 - سرعة رد الفعل
        function reactionTest() {
            content.innerHTML = `<div id="reactionBox" style="width:100%; height:200px; background:var(--card); border-radius:20px; display:flex; align-items:center; justify-content:center; cursor:pointer;"><p>اضغط عندما يتحول إلى أخضر</p></div><p id="reactionResult"></p>`;
            const box = document.getElementById('reactionBox');
            let startTime;
            box.onclick = () => {
                if (box.style.background === 'green') {
                    const reaction = Date.now() - startTime;
                    document.getElementById('reactionResult').innerText = `⏱️ ${reaction} مللي ثانية`;
                    box.style.background = 'var(--card)';
                }
            };
            setTimeout(() => { box.style.background = 'green'; startTime = Date.now(); }, Math.random()*2000+1000);
        }

        // 7 - لغز 15 (بسيط)
        function puzzle15() { content.innerHTML = '<p>🔢 15 Puzzle (قريباً)</p>'; }

        // 8 - الكلمة المبعثرة
        function wordScramble() {
            const words = ['تفاحة','مدرسة','كمبيوتر','مكتبة'];
            const word = words[Math.floor(Math.random()*words.length)];
            const scrambled = word.split('').sort(()=>Math.random()-0.5).join('');
            content.innerHTML = `<p>أعد ترتيب: <strong>${scrambled}</strong></p><input id="scrambleInput"><button class="btn" id="checkScramble">تحقق</button><p id="scrambleRes"></p>`;
            document.getElementById('checkScramble').onclick = ()=>{
                const ans = document.getElementById('scrambleInput').value.trim();
                document.getElementById('scrambleRes').innerText = ans===word ? '✅ صحيح!' : '❌ خطأ';
            };
        }

        // 9 - صح أو خطأ
        function trueFalse() {
            const qs = [{q:'الماء يغلي عند 100 درجة مئوية', a:true},{q:'القطط تطير', a:false}];
            const q = qs[Math.floor(Math.random()*qs.length)];
            content.innerHTML = `<p>${q.q}</p><button class="btn" id="trueBtn">✅ صح</button><button class="btn" id="falseBtn">❌ خطأ</button><p id="tfResult"></p>`;
            document.getElementById('trueBtn').onclick = ()=> document.getElementById('tfResult').innerText = q.a ? '🎉 صحيح' : '❌ خطأ';
            document.getElementById('falseBtn').onclick = ()=> document.getElementById('tfResult').innerText = !q.a ? '🎉 صحيح' : '❌ خطأ';
        }

        // 10 - سودوكو صغيرة
        function miniSudoku() { content.innerHTML = '<p>🧩 4×4 Sudoku (قريباً)</p>'; }

        // 11 - عجلة الحظ
        function spinWheel() {
            content.innerHTML = `<div style="text-align:center;"><button class="btn" id="spinBtn">🎡 لف العجلة</button><p id="wheelResult"></p></div>`;
            document.getElementById('spinBtn').onclick = ()=>{
                const items = ['ربحت!','حظ أوفر','جائزة','محاولة أخرى'];
                document.getElementById('wheelResult').innerText = items[Math.floor(Math.random()*items.length)];
            };
        }

        // 12 - رمي النرد
        function diceRoll() {
            content.innerHTML = `<p>🎲 نتيجتك: <span id="playerDice">-</span> · الحاسوب: <span id="compDice">-</span></p><button class="btn" id="rollDice">ارم النرد</button><p id="diceWinner"></p>`;
            document.getElementById('rollDice').onclick = ()=>{
                const p = Math.floor(Math.random()*6)+1, c = Math.floor(Math.random()*6)+1;
                document.getElementById('playerDice').textContent = p;
                document.getElementById('compDice').textContent = c;
                document.getElementById('diceWinner').innerText = p>c ? '🎉 فزت' : (p<c?'😢 خسرت':'🤝 تعادل');
            };
        }

        // 13 - مونتي هول
        function montyHall() {
            content.innerHTML = `<p>اختر باباً (1،2،3) سيارة خلف واحد</p><select id="doorSelect"><option value="1">1</option><option value="2">2</option><option value="3">3</option></select><button class="btn" id="playMonty">العب</button><p id="montyResult"></p>`;
            document.getElementById('playMonty').onclick = ()=>{
                const car = Math.floor(Math.random()*3)+1;
                const choice = parseInt(document.getElementById('doorSelect').value);
                const show = [1,2,3].find(d=> d!==car && d!==choice) || 1;
                const newChoice = [1,2,3].find(d=> d!==choice && d!==show);
                const win = newChoice === car;
                document.getElementById('montyResult').innerText = win ? '🎉 ربحت السيارة!' : '😢 خسرت';
            };
        }

        // 14-18 ألعاب قماشية بسيطة (مكان للإضافة)
        function flappyDot() { content.innerHTML = '<canvas id="flappyCanvas" width="300" height="400"></canvas><p>اضغط للقفز (قريباً)</p>'; }
        function avoidObstacles() { content.innerHTML = '<canvas id="avoidCanvas" width="300" height="400"></canvas>'; }
        function catchFalling() { content.innerHTML = '<canvas id="catchCanvas" width="300" height="400"></canvas>'; }
        function findDifference() { content.innerHTML = '<p>🔍 أوجد الاختلاف (صورة1 وصورة2)</p>'; }
        function drawPath() { content.innerHTML = '<canvas id="pathCanvas" width="300" height="300"></canvas><p>ارسم خطاً</p>'; }
        function capitalsQuiz() {
            const capitals = [{country:'فرنسا', capital:'باريس'},{country:'مصر', capital:'القاهرة'}];
            const q = capitals[Math.floor(Math.random()*capitals.length)];
            content.innerHTML = `<p>ما عاصمة ${q.country}؟</p><input id="capInput"><button class="btn" id="capCheck">تحقق</button><p id="capRes"></p>`;
            document.getElementById('capCheck').onclick = ()=> document.getElementById('capRes').innerText = document.getElementById('capInput').value.trim()===q.capital?'✅ صحيح':'❌ خطأ';
        }
        function soundGuessing() { content.innerHTML = '<p>🔊 قريباً: تخمين الصوت</p>'; }

        // دوال التنظيف
        window.closeModal = closeModal;
    })();
</script>
</body>
</html>
