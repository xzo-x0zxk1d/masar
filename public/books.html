<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>مكتبة مَسَار</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .books-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        .book-card {
            background: var(--glass);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 15px;
            border: 2px solid var(--lime);
            transition: 0.2s;
        }
        .book-cover {
            width: 100%;
            height: 200px;
            object-fit: contain;
            background: #1a2e1a;
            border-radius: 15px;
            margin-bottom: 10px;
        }
        .search-box {
            width: 100%;
            padding: 15px;
            border-radius: 40px;
            border: 2px solid var(--lime);
            background: var(--card);
            color: var(--text);
            font-size: 1.1rem;
            margin-bottom: 25px;
        }
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        .page-btn {
            padding: 10px 18px;
            background: var(--card);
            border: 2px solid var(--lime);
            border-radius: 30px;
            cursor: pointer;
        }
        .page-btn.active { background: var(--lime); color: #0a140a; }
        @media (min-width: 600px) { .books-grid { grid-template-columns: repeat(2,1fr); } }
        @media (min-width: 900px) { .books-grid { grid-template-columns: repeat(3,1fr); } }
        @media (min-width: 1200px) { .books-grid { grid-template-columns: repeat(4,1fr); } }
    </style>
</head>
<body>
    <div class="privacy-banner" id="privacyBanner">
        <span>🔒 تنبيه الخصوصية</span> — نحتفظ بعنوان IP مرة واحدة فقط. بالمتابعة أنت موافق.
        <button id="acceptPrivacy">موافق</button>
    </div>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <img src="school.png" alt="شعار المدرسة" class="school-logo">
                <span>مَسَار</span>
                <small>فيصل</small>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html">الرئيسية</a></li>
                <li><a href="books.html" class="active">الكتب</a></li>
                <li><a href="audiobooks.html">المسموع</a></li>
                <li><a href="games.html">الألعاب</a></li>
                <li><a href="draw.html">الرسم</a></li>
                <li><a href="map.html">الخريطة</a></li>
            </ul>
            <div class="toolbar">
                <button id="toggleMode" title="تبديل السمة">🌙</button>
                <button id="increaseFont" title="تكبير الخط">أكبر</button>
                <button id="decreaseFont" title="تصغير الخط">أصغر</button>
            </div>
        </div>
    </nav>

    <section style="padding: 20px 0;">
        <h2 style="font-size:2.2rem; margin-bottom:20px;">📚 المكتبة العالمية</h2>
        <input type="text" id="searchInput" class="search-box" placeholder="ابحث عن كتاب... (مثال: الرياض)">
        <div id="booksContainer" class="books-grid"></div>
        <div id="pagination" class="pagination"></div>
        <div id="loading" style="text-align:center; padding:30px; display:none;">⏳ جاري البحث...</div>
    </section>

    <footer class="footer">
        <p>🌿 مَسَار · إبداع <strong>فيصل</strong></p>
    </footer>

    <script src="js/main.js"></script>
    <script>
        let currentQuery = 'الرياض';
        let currentPage = 0;
        const maxResults = 20;

        async function searchBooks(query, page = 0) {
            if (!query) return;
            document.getElementById('loading').style.display = 'block';
            document.getElementById('booksContainer').innerHTML = '';
            const startIndex = page * maxResults;
            const res = await fetch(`/api/books?q=${encodeURIComponent(query)}&startIndex=${startIndex}&maxResults=${maxResults}`);
            const data = await res.json();
            document.getElementById('loading').style.display = 'none';
            if (!data.items) {
                document.getElementById('booksContainer').innerHTML = '<p>😕 لا توجد نتائج</p>';
                return;
            }
            renderBooks(data.items);
            renderPagination(data.totalItems, page);
        }

        function renderBooks(items) {
            const html = items.map(item => {
                const info = item.volumeInfo;
                const title = info.title || 'بدون عنوان';
                const authors = info.authors ? info.authors.join('، ') : 'مؤلف غير معروف';
                const thumb = info.imageLinks?.thumbnail || 'https://via.placeholder.com/128x192/1a2e1a/a3e635?text=📖';
                const link = info.previewLink || '#';
                return `
                    <div class="book-card" onclick="window.open('${link}', '_blank')">
                        <img src="${thumb}" class="book-cover" alt="${title}">
                        <h3>${title}</h3>
                        <p>${authors}</p>
                        ${info.publishedDate ? `<p>📅 ${info.publishedDate}</p>` : ''}
                    </div>
                `;
            }).join('');
            document.getElementById('booksContainer').innerHTML = html;
        }

        function renderPagination(total, page) {
            const container = document.getElementById('pagination');
            if (!total || total <= maxResults) { container.innerHTML = ''; return; }
            const totalPages = Math.min(Math.ceil(total / maxResults), 5);
            let btns = '';
            for (let i=0; i<totalPages; i++) {
                btns += `<button class="page-btn ${i===page?'active':''}" data-page="${i}">${i+1}</button>`;
            }
            container.innerHTML = btns;
            container.querySelectorAll('.page-btn').forEach(b => {
                b.onclick = () => {
                    currentPage = parseInt(b.dataset.page);
                    searchBooks(currentQuery, currentPage);
                };
            });
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            currentQuery = e.target.value.trim();
            currentPage = 0;
            searchBooks(currentQuery, 0);
        });

        // البحث الأولي
        searchBooks(currentQuery, 0);
    </script>
</body>
</html>
