<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المكتبة - مَسَار</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .book-cover { width:100%; height:200px; object-fit:contain; background:#1a2e1a; border-radius:15px; }
        .search-box { width:100%; padding:15px; border-radius:40px; border:2px solid var(--lime); background:var(--card); color:var(--text); margin-bottom:20px; }
    </style>
</head>
<body>
    <div class="privacy-banner" id="privacyBanner"><span><i class="fas fa-shield-alt"></i> تنبيه الخصوصية</span> — نحتفظ بعنوان IP مرة واحدة. <button id="acceptPrivacy"><i class="fas fa-check"></i> موافق</button></div>
    <nav class="navbar"><div class="nav-container">
        <div class="logo"><img src="school.png" class="school-logo"><span>مَسَار</span><small>فيصل</small></div>
        <ul class="nav-menu">
            <li><a href="index.html"><i class="fas fa-home"></i> الرئيسية</a></li>
            <li><a href="books.html" class="active"><i class="fas fa-book"></i> الكتب</a></li>
            <li><a href="audiobooks.html"><i class="fas fa-headphones"></i> المسموع</a></li>
            <li><a href="games.html"><i class="fas fa-gamepad"></i> الألعاب</a></li>
            <li><a href="draw.html"><i class="fas fa-paint-brush"></i> الرسم</a></li>
            <li><a href="map.html"><i class="fas fa-map"></i> الخريطة</a></li>
        </ul>
        <div class="toolbar">
            <button id="toggleMode"><i class="fas fa-moon"></i></button>
            <button id="increaseFont">A+</button>
            <button id="decreaseFont">A-</button>
        </div>
    </div></nav>

    <section>
        <h2><i class="fas fa-book"></i> المكتبة العالمية</h2>
        <input type="text" id="searchInput" class="search-box" placeholder="ابحث عن كتاب...">
        <div id="booksContainer" class="grid"></div>
        <div id="pagination" style="display:flex; gap:10px; justify-content:center; margin-top:20px;"></div>
    </section>

    <footer class="footer"><p><i class="fas fa-leaf"></i> مَسَار · إبداع <strong>فيصل</strong></p></footer>
    <script src="js/main.js"></script>
    <script>
        let currentQuery='الرياض', currentPage=0, maxResults=20;
        async function searchBooks(q, page=0){
            document.getElementById('booksContainer').innerHTML='<p>جاري البحث...</p>';
            const res=await fetch(`/api/books?q=${encodeURIComponent(q)}&startIndex=${page*maxResults}&maxResults=${maxResults}`);
            const data=await res.json();
            if(!data.items){ document.getElementById('booksContainer').innerHTML='<p>لا توجد نتائج</p>'; return; }
            renderBooks(data.items);
            renderPagination(data.totalItems, page);
        }
        function renderBooks(items){
            document.getElementById('booksContainer').innerHTML=items.map(i=>{
                const info=i.volumeInfo;
                return `<div class="card" onclick="window.open('${info.previewLink||'#'}','_blank')">
                    <img src="${info.imageLinks?.thumbnail||'https://via.placeholder.com/128x192/1a2e1a/a3e635?text=كتاب'}" class="book-cover">
                    <h3>${info.title||'بدون عنوان'}</h3>
                    <p>${(info.authors||['مؤلف غير معروف']).join('، ')}</p>
                </div>`;
            }).join('');
        }
        function renderPagination(total, page){
            const cont=document.getElementById('pagination');
            if(!total||total<=maxResults){ cont.innerHTML=''; return; }
            let btns='';
            for(let i=0; i<Math.min(Math.ceil(total/maxResults),5); i++){
                btns+=`<button class="btn page-btn ${i===page?'btn-primary':''}" data-page="${i}">${i+1}</button>`;
            }
            cont.innerHTML=btns;
            cont.querySelectorAll('.page-btn').forEach(b=>b.onclick=()=>searchBooks(currentQuery,parseInt(b.dataset.page)));
        }
        document.getElementById('searchInput').addEventListener('input',e=>{ currentQuery=e.target.value; searchBooks(currentQuery,0); });
        searchBooks(currentQuery);
    </script>
</body>
</html>
