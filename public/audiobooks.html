<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المسموع - مَسَار</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="privacy-banner" id="privacyBanner"><span><i class="fas fa-shield-alt"></i> تنبيه الخصوصية</span> — نحتفظ بعنوان IP مرة واحدة. <button id="acceptPrivacy"><i class="fas fa-check"></i> موافق</button></div>
    <nav class="navbar"><div class="nav-container">
        <div class="logo"><img src="school.png" class="school-logo"><span>مَسَار</span><small>فيصل</small></div>
        <ul class="nav-menu">
            <li><a href="index.html"><i class="fas fa-home"></i> الرئيسية</a></li>
            <li><a href="books.html"><i class="fas fa-book"></i> الكتب</a></li>
            <li><a href="audiobooks.html" class="active"><i class="fas fa-headphones"></i> المسموع</a></li>
            <li><a href="games.html"><i class="fas fa-gamepad"></i> الألعاب</a></li>
            <li><a href="draw.html"><i class="fas fa-paint-brush"></i> الرسم</a></li>
            <li><a href="map.html"><i class="fas fa-map"></i> الخريطة</a></li>
        </ul>
        <div class="toolbar">
            <button id="toggleMode"><i class="fas fa-moon"></i></button>
            <button id="increaseFont">A+</button>
            <button id="decreaseFont">A-</button>
        </div>
    </div></nav>

    <section>
        <h2><i class="fas fa-headphones"></i> الكتب المسموعة</h2>
        <input type="text" id="audioSearch" class="search-box" placeholder="ابحث عن كتاب مسموع...">
        <div id="audioContainer" class="grid"></div>
    </section>

    <footer class="footer"><p><i class="fas fa-leaf"></i> مَسَار · إبداع <strong>فيصل</strong></p></footer>
    <script src="js/main.js"></script>
    <script>
        let timeout;
        async function searchAudiobooks(q){
            if(!q) q='';
            document.getElementById('audioContainer').innerHTML='<p>جاري التحميل...</p>';
            const res=await fetch(`/api/audiobooks?q=${encodeURIComponent(q)}`);
            const data=await res.json();
            if(!data.books.length){ document.getElementById('audioContainer').innerHTML='<p>لا توجد نتائج</p>'; return; }
            document.getElementById('audioContainer').innerHTML=data.books.map(b=>`
                <div class="card">
                    <i class="fas fa-headphones fa-3x" style="color:var(--lime);"></i>
                    <h3>${b.title}</h3>
                    <p>${b.author}</p>
                    <audio controls src="${b.audioUrl}" style="width:100%; margin-top:10px;"></audio>
                </div>
            `).join('');
        }
        document.getElementById('audioSearch').addEventListener('input',e=>{
            clearTimeout(timeout);
            timeout=setTimeout(()=>searchAudiobooks(e.target.value),500);
        });
        searchAudiobooks('');
    </script>
</body>
</html>
